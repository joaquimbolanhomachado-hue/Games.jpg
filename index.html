<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Games.JPG</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <header class="header-page">
        <div class="logo-imagem">
            <img src="imagem/Humor Negro.png" alt="Logo Pinterest">
        </div>
        <div id="titulo-pagina">
        <h1 class="titulo-pagina">Games.JPG</h1>
        </div>
        </header>
    </header>
    <div class="barra-navegacao">

            <strong>Pinterest Clone</strong>
        </div>

        <div class="item-link">
            <a href="#">Início</a>
        </div>

        <div class="item-pesquisa">
            <input type="text" placeholder="Pesquisar por imagens...">
        </div>

        <div class="item-login">
             <a href="login.html">
            <button class="botao entrar" style="background-color: red; border: red; border-radius: 0;">Login</button>
        </a>
        </div>

        
       
    </div>
    <div class="body-page">
        
        <div class="pin-container">
            <div class="card-pin">
                <img src="imagem/download (1).jfif" alt="Post 1">

            </div>
            <div class="card-pin">
                <img src="imagem/download (2).jfif" alt="Post 2">
                <div class="desc"><b>Hora de Aventura/</b>Walpaper</div>
            </div>
            <div class="card-pin">
                <img src="imagem/download (3).jfif" alt="Post 3">
                <div class="desc"><b>Gumbal/</b>Icon</div>
            </div>
            <div class="card-pin">
                <img src="imagem/download.jfif" alt="Post 4">
                <div class="desc"><b>Doce/</b>Icon</div>
            </div>
            <div class="card-pin">
                <img src="imagem/scooby-doo be doo.jfif" alt="Post 5">
                <div class="desc"><b>Sonic/</b>Sprite</div>
            </div>
            <div class="card-pin">
                <img src="imagem/Si.jfif" alt="Post 6">
                <div class="desc"><b>Batman/</b>Walpaper</div>
            </div>
        </div>

    </div>

    
    <footer class="footer-page">
